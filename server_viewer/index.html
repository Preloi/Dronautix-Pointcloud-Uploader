<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Potree Viewer</title>
    <link rel="icon" type="image/x-icon" href="./libs/potree/resources/Icon.ico">
    <link rel="stylesheet" type="text/css" href="./libs/potree/potree.css">
    <link rel="stylesheet" type="text/css" href="./libs/jquery-ui/jquery-ui.min.css">
    <link rel="stylesheet" type="text/css" href="./libs/openlayers3/ol.css">
    <link rel="stylesheet" type="text/css" href="./libs/spectrum/spectrum.css">
    <link rel="stylesheet" type="text/css" href="./libs/jstree/themes/mixed/style.css">

</head>

<body>
    <script src="./libs/jquery/jquery-3.1.1.min.js"></script>
    <script src="./libs/spectrum/spectrum.js"></script>
    <script src="./libs/jquery-ui/jquery-ui.min.js"></script>
    <script src="./libs/other/BinaryHeap.js"></script>
    <script src="./libs/tween/tween.min.js"></script>
    <script src="./libs/d3/d3.js"></script>
    <script src="./libs/proj4/proj4.js"></script>
    <script src="./libs/openlayers3/ol.js"></script>
    <script src="./libs/i18next/i18next.js"></script>
    <script src="./libs/jstree/jstree.js"></script>
    <script src="./libs/copc/index.js"></script>
    <script src="./libs/potree/potree.js"></script>
    <script src="./libs/plasio/js/laslaz.js"></script>

    <!-- Viewer Container - versteckt bis Check abgeschlossen -->
    <div class="potree_container" id="potree_container" style="position: absolute; width: 100%; height: 100%; left: 0px; top: 0px; display: none;">
        <div id="potree_render_area"></div>
        <div id="potree_sidebar_container"> </div>
    </div>

    <!-- Lade-Anzeige während Check läuft -->
    <div id="loading_check" style="
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background: linear-gradient(135deg, #1e1e2e 0%, #2a2a3c 100%);
        color: #e2e8f0;
        font-family: 'Segoe UI', sans-serif;
    ">
        <div style="text-align: center;">
            <div style="font-size: 48px; margin-bottom: 16px;">⏳</div>
            <div style="font-size: 18px;">Prüfe Projektstatus...</div>
        </div>
    </div>

    <script>
        const deletedProjectRetentionDays = 30;

        function showUnavailableProjectPage(messageHtml) {
            document.body.innerHTML = `
                <div style="
                    display: flex;
                    justify-content: center;
                    align-items: center;
                    height: 100vh;
                    background: linear-gradient(135deg, #1e1e2e 0%, #2a2a3c 100%);
                    margin: 0;
                    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
                    color: #e2e8f0;
                ">
                    <div style="
                        text-align: center;
                        padding: 40px;
                        background: #2a2a3c;
                        border-radius: 12px;
                        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
                        max-width: 500px;
                    ">
                        <div style="font-size: 64px; margin-bottom: 20px;">🚫</div>
                        <h1 style="
                            font-size: 28px;
                            margin: 0 0 16px 0;
                            color: #e74c3c;
                        ">Projekt nicht verfügbar</h1>
                        <p style="
                            font-size: 16px;
                            color: #94a3b8;
                            margin: 0 0 24px 0;
                            line-height: 1.6;
                        ">
                            ${messageHtml}
                        </p>
                        <a
                            href="https://dronautix.at"
                            target="_blank"
                            rel="noopener noreferrer"
                            style="display: inline-block;"
                        >
                            <img
                                src="./libs/potree/resources/images/dronautix_logo.png"
                                alt="Dronautix"
                                style="
                                    display: block;
                                    width: 180px;
                                    max-width: 100%;
                                    height: auto;
                                    margin: 0 auto;
                                "
                            >
                        </a>
                    </div>
                </div>
            `;
        }

        function isDeletedEntryActive(entry) {
            if (!entry || !entry.deleted_at) {
                return false;
            }

            const deletedAt = new Date(entry.deleted_at);
            if (Number.isNaN(deletedAt.getTime())) {
                return false;
            }

            const ageMs = Date.now() - deletedAt.getTime();
            const retentionMs = deletedProjectRetentionDays * 24 * 60 * 60 * 1000;
            return ageMs <= retentionMs;
        }

        // ============================================================
        // GELÖSCHTE PROJEKTE CHECK - Prüft ob Projekt gelöscht wurde
        // ============================================================
        async function checkIfProjectDeleted() {
            try {
                const urlParams = new URLSearchParams(window.location.search);
                const projectId = urlParams.get('id');

                if (!projectId) {
                    return false; // Keine ID in URL, zeige Viewer normal
                }

                let projectFolderPath = '';
                let projectShortId = projectId;

                if (projectId.includes('/')) {
                    const idParts = projectId.split('/');
                    if (idParts.length >= 3) {
                        projectFolderPath = `pointclouds/${idParts.slice(0, 3).join('/')}`;
                        projectShortId = idParts[1];
                    }
                }

                // Lade die Löschliste von derselben Origin, damit kein CORS-Fehler entsteht.
                const deletedProjectsUrl = new URL('./deleted_projects.json', window.location.href);
                deletedProjectsUrl.searchParams.set('t', Date.now());
                const response = await fetch(deletedProjectsUrl.toString(), { cache: 'no-store' });

                if (!response.ok) {
                    return false; // Liste nicht gefunden, zeige Viewer normal
                }

                const deletedData = await response.json();
                const deletedProjects = (deletedData.deleted_projects || []).filter(isDeletedEntryActive);

                const isDeleted = deletedProjects.some(proj =>
                    proj.id === projectShortId || (projectFolderPath && proj.s3_path === projectFolderPath)
                );

                if (isDeleted) {
                    showUnavailableProjectPage(
                        "Dieses Projekt wurde gelöscht und ist nicht mehr verfügbar.<br>Der Link ist nicht mehr gültig."
                    );
                    return true; // Projekt ist gelöscht
                }

                return false; // Projekt ist nicht gelöscht

            } catch (error) {
                // Bei Fehlern (Netzwerk, etc.) zeige Viewer normal
                console.warn('Fehler beim Prüfen der Gelöscht-Liste:', error);
                return false;
            }
        }

        // Führe Check aus und initialisiere Viewer nur wenn Projekt nicht gelöscht
        checkIfProjectDeleted().then(async isDeleted => {
            // Verstecke Lade-Anzeige
            const loadingDiv = document.getElementById('loading_check');
            if (loadingDiv) loadingDiv.style.display = 'none';

            if (isDeleted) {
                return; // Stoppe hier, zeige nur Fehlermeldung
            }

            // Zeige Viewer nur wenn Projekt NICHT gelöscht
            const viewerContainer = document.getElementById('potree_container');
            if (viewerContainer) viewerContainer.style.display = 'block';

            // ============================================================
            // POTREE VIEWER INITIALISIERUNG
            // ============================================================
            window.viewer = new Potree.Viewer(document.getElementById("potree_render_area"));

        // --- GRUNDEINSTELLUNGEN ---
        viewer.setEDLEnabled(true);
        viewer.setFOV(60);
        viewer.setPointBudget(5_000_000);
        viewer.setMinNodeSize(0);
        // Splat Quality wird über die GUI gesetzt (da setSplatQuality nicht verfügbar in Potree 1.8.0)
        viewer.loadSettingsFromURL();
        viewer.setDescription("");

        viewer.loadGUI(() => {
            viewer.setLanguage('de');
            viewer.setBackground("gradient");
            viewer.setControls(viewer.earthControls);
            $("#menu_appearance").next().show();
            $("#menu_tools").next().show();
            $("#menu_scene").next().show();

            // Splat Quality auf High Quality setzen
            if (viewer.renderer && viewer.renderer.capabilities) {
                viewer.renderer.capabilities.splatQuality = "hq";
            }

            // Sidebar explizit anzeigen
            viewer.toggleSidebar();
            $("#potree_sidebar_container").show();

            console.log("GUI geladen und Sidebar aktiviert");
        });

        // --- DYNAMISCHER LADER (UNTERSTUETZT ANONYME KURZ-IDS UND LEGACY-PFADE) ---

        const urlParams = new URLSearchParams(window.location.search);
        const rawProjectId = urlParams.get('id');
        const projectDisplayName = urlParams.get('name');

        const normalizeViewerPath = (projectPath) => {
            if (!projectPath || typeof projectPath !== 'string') {
                return '';
            }

            return projectPath.startsWith('pointclouds/')
                ? projectPath.slice('pointclouds/'.length)
                : projectPath;
        };

        const buildProjectDisplayName = (projectEntry, fallbackValue) => {
            if (!projectEntry) {
                return fallbackValue;
            }

            const kunde = typeof projectEntry.kunde === 'string' ? projectEntry.kunde.trim() : '';
            const projekt = typeof projectEntry.projekt === 'string' ? projectEntry.projekt.trim() : '';

            if (kunde && projekt) {
                return `${kunde} - ${projekt}`;
            }

            return kunde || projekt || fallbackValue;
        };

        const buildProjectAssetPath = (viewerPath) => {
            const normalizedViewerPath = normalizeViewerPath(viewerPath);
            const lowerViewerPath = normalizedViewerPath.toLowerCase();

            if (
                lowerViewerPath.endsWith('.copc.laz') ||
                lowerViewerPath.endsWith('metadata.json') ||
                lowerViewerPath.endsWith('cloud.js') ||
                lowerViewerPath.endsWith('ept.json')
            ) {
                return `./pointclouds/${normalizedViewerPath}`;
            }

            return `./pointclouds/${normalizedViewerPath}/metadata.json`;
        };

        const resolveProjectConfig = async (projectId) => {
            if (!projectId) {
                return null;
            }

            if (projectId.includes('/')) {
                return {
                    viewerPath: projectId,
                    displayName: projectId,
                };
            }

            const indexUrl = new URL('./projects_index.json', window.location.href);
            indexUrl.searchParams.set('t', Date.now());
            const response = await fetch(indexUrl.toString(), { cache: 'no-store' });
            if (!response.ok) {
                return {
                    viewerPath: '',
                    displayName: projectId,
                };
            }

            const indexData = await response.json();
            const projects = Array.isArray(indexData.projects) ? indexData.projects : [];
            const matchedProject = projects.find(project => String(project.id) === projectId);
            if (!matchedProject) {
                return {
                    viewerPath: '',
                    displayName: projectId,
                };
            }

            const baseViewerPath = normalizeViewerPath(matchedProject.viewer_path || matchedProject.s3_path || '');
            const projectFormat = typeof matchedProject.format === 'string'
                ? matchedProject.format.toLowerCase()
                : '';
            const viewerPath = projectFormat === 'copc' && !baseViewerPath.toLowerCase().endsWith('.copc.laz')
                ? `${baseViewerPath}/source.copc.laz`
                : baseViewerPath;

            return {
                viewerPath,
                displayName: buildProjectDisplayName(matchedProject, projectId),
            };
        };

        const projectConfig = await resolveProjectConfig(rawProjectId);

        if (projectConfig && projectConfig.viewerPath) {

            const finalName = projectDisplayName ? projectDisplayName : projectConfig.displayName;
            const path = buildProjectAssetPath(projectConfig.viewerPath);

            try {
                const response = await fetch(path, { method: 'HEAD', cache: 'no-store' });
                if (!response.ok) {
                    showUnavailableProjectPage(
                        "Dieses Projekt ist nicht mehr online verfügbar.<br>Die zugehörigen Dateien wurden bereits entfernt."
                    );
                    return;
                }
            } catch (error) {
                console.warn("Projektdatei konnte nicht geprüft werden:", error);
                showUnavailableProjectPage(
                    "Dieses Projekt ist aktuell nicht erreichbar.<br>Bitte versuche es später erneut oder kontaktiere Dronautix."
                );
                return;
            }

            // Laden
            Potree.loadPointCloud(path, finalName, e => {
                if (!e || !e.pointcloud) {
                    showUnavailableProjectPage(
                        "Dieses Projekt ist nicht mehr online verfügbar.<br>Die zugehörigen Dateien wurden bereits entfernt."
                    );
                    return;
                }

                let scene = viewer.scene;
                let pointcloud = e.pointcloud;

                let material = pointcloud.material;
                material.size = 0.5;
                material.minSize = 1;
                material.pointSizeType = Potree.PointSizeType.ADAPTIVE;
                material.shape = Potree.PointShape.CIRCLE;
                material.activeAttributeName = "rgba";

                scene.addPointCloud(pointcloud);
                viewer.fitToScreen();
            });

            // Setzt den Titel im Browser-Tab
            document.title = finalName;

        } else {
            console.log("Keine ID im Link gefunden oder Projekt konnte nicht aufgeloest werden.");
        }

        }); // Ende der checkIfProjectDeleted Promise

    </script>
  </body>
</html>
