<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Potree Viewer</title>
    <link rel="icon" type="image/x-icon" href="./libs/potree/resources/Icon.ico">
    <link rel="stylesheet" type="text/css" href="./libs/potree/potree.css">
    <link rel="stylesheet" type="text/css" href="./libs/jquery-ui/jquery-ui.min.css">
    <link rel="stylesheet" type="text/css" href="./libs/openlayers3/ol.css">
    <link rel="stylesheet" type="text/css" href="./libs/spectrum/spectrum.css">
    <link rel="stylesheet" type="text/css" href="./libs/jstree/themes/mixed/style.css">

</head>

<body>
    <script src="./libs/jquery/jquery-3.1.1.min.js"></script>
    <script src="./libs/spectrum/spectrum.js"></script>
    <script src="./libs/jquery-ui/jquery-ui.min.js"></script>
    <script src="./libs/other/BinaryHeap.js"></script>
    <script src="./libs/tween/tween.min.js"></script>
    <script src="./libs/d3/d3.js"></script>
    <script src="./libs/proj4/proj4.js"></script>
    <script src="./libs/openlayers3/ol.js"></script>
    <script src="./libs/i18next/i18next.js"></script>
    <script src="./libs/jstree/jstree.js"></script>
    <script src="./libs/copc/index.js"></script>
    <script src="./libs/potree/potree.js"></script>
    <script src="./libs/plasio/js/laslaz.js"></script>

    <!-- Viewer Container - versteckt bis Check abgeschlossen -->
    <div class="potree_container" id="potree_container" style="position: absolute; width: 100%; height: 100%; left: 0px; top: 0px; display: none;">
        <div id="potree_render_area"></div>
        <div id="potree_sidebar_container"> </div>
    </div>

    <!-- Lade-Anzeige während Check läuft -->
    <div id="loading_check" style="
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background: linear-gradient(135deg, #1e1e2e 0%, #2a2a3c 100%);
        color: #e2e8f0;
        font-family: 'Segoe UI', sans-serif;
    ">
        <div style="text-align: center;">
            <div style="font-size: 48px; margin-bottom: 16px;">⏳</div>
            <div style="font-size: 18px;">Prüfe Projektstatus...</div>
        </div>
    </div>

    <script>
        // ============================================================
        // GELÖSCHTE PROJEKTE CHECK - Prüft ob Projekt gelöscht wurde
        // ============================================================
        async function checkIfProjectDeleted() {
            try {
                const urlParams = new URLSearchParams(window.location.search);
                const projectId = urlParams.get('id');

                if (!projectId) {
                    return false; // Keine ID in URL, zeige Viewer normal
                }

                // Verwende den Projektordner als stabile Kennung.
                // Potree: kunde/abc123/projekt
                // COPC:   kunde/abc123/projekt/source.copc.laz
                const idParts = projectId.split('/');
                if (idParts.length < 3) {
                    return false; // Ungültiges Format
                }

                const projectFolderPath = `pointclouds/${idParts.slice(0, 3).join('/')}`;
                const projectShortId = idParts[1];

                // Lade die Löschliste von derselben Origin, damit kein CORS-Fehler entsteht.
                const deletedProjectsUrl = new URL('./deleted_projects.json', window.location.href);
                deletedProjectsUrl.searchParams.set('t', Date.now());
                const response = await fetch(deletedProjectsUrl.toString(), { cache: 'no-store' });

                if (!response.ok) {
                    return false; // Liste nicht gefunden, zeige Viewer normal
                }

                const deletedData = await response.json();
                const deletedProjects = deletedData.deleted_projects || [];

                // Prüfe ob dieses Projekt gelöscht wurde
                const isDeleted = deletedProjects.some(proj =>
                    proj.s3_path === projectFolderPath || proj.id === projectShortId
                );

                if (isDeleted) {
                    // Projekt wurde gelöscht - zeige Fehlermeldung
                    document.body.innerHTML = `
                        <div style="
                            display: flex;
                            justify-content: center;
                            align-items: center;
                            height: 100vh;
                            background: linear-gradient(135deg, #1e1e2e 0%, #2a2a3c 100%);
                            margin: 0;
                            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
                            color: #e2e8f0;
                        ">
                            <div style="
                                text-align: center;
                                padding: 40px;
                                background: #2a2a3c;
                                border-radius: 12px;
                                box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
                                max-width: 500px;
                            ">
                                <div style="font-size: 64px; margin-bottom: 20px;">🚫</div>
                                <h1 style="
                                    font-size: 28px;
                                    margin: 0 0 16px 0;
                                    color: #e74c3c;
                                ">Projekt nicht verfügbar</h1>
                                <p style="
                                    font-size: 16px;
                                    color: #94a3b8;
                                    margin: 0 0 24px 0;
                                    line-height: 1.6;
                                ">
                                    Dieses Projekt wurde gelöscht und ist nicht mehr verfügbar.<br>
                                    Der Link ist nicht mehr gültig.
                                </p>
                                <a
                                    href="https://dronautix.at"
                                    target="_blank"
                                    rel="noopener noreferrer"
                                    style="display: inline-block;"
                                >
                                    <img
                                        src="./libs/potree/resources/images/dronautix_logo.png"
                                        alt="Dronautix"
                                        style="
                                            display: block;
                                            width: 180px;
                                            max-width: 100%;
                                            height: auto;
                                            margin: 0 auto;
                                        "
                                    >
                                </a>
                            </div>
                        </div>
                    `;
                    return true; // Projekt ist gelöscht
                }

                return false; // Projekt ist nicht gelöscht

            } catch (error) {
                // Bei Fehlern (Netzwerk, etc.) zeige Viewer normal
                console.warn('Fehler beim Prüfen der Gelöscht-Liste:', error);
                return false;
            }
        }

        // Führe Check aus und initialisiere Viewer nur wenn Projekt nicht gelöscht
        checkIfProjectDeleted().then(isDeleted => {
            // Verstecke Lade-Anzeige
            const loadingDiv = document.getElementById('loading_check');
            if (loadingDiv) loadingDiv.style.display = 'none';

            if (isDeleted) {
                return; // Stoppe hier, zeige nur Fehlermeldung
            }

            // Zeige Viewer nur wenn Projekt NICHT gelöscht
            const viewerContainer = document.getElementById('potree_container');
            if (viewerContainer) viewerContainer.style.display = 'block';

            // ============================================================
            // POTREE VIEWER INITIALISIERUNG
            // ============================================================
            window.viewer = new Potree.Viewer(document.getElementById("potree_render_area"));

        // --- GRUNDEINSTELLUNGEN ---
        viewer.setEDLEnabled(true);
        viewer.setFOV(60);
        viewer.setPointBudget(5_000_000);
        viewer.setMinNodeSize(0);
        // Splat Quality wird über die GUI gesetzt (da setSplatQuality nicht verfügbar in Potree 1.8.0)
        viewer.loadSettingsFromURL();
        viewer.setDescription("");

        viewer.loadGUI(() => {
            viewer.setLanguage('de');
            viewer.setBackground("gradient");
            viewer.setControls(viewer.earthControls);
            $("#menu_appearance").next().show();
            $("#menu_tools").next().show();
            $("#menu_scene").next().show();

            // Splat Quality auf High Quality setzen
            if (viewer.renderer && viewer.renderer.capabilities) {
                viewer.renderer.capabilities.splatQuality = "hq";
            }

            // Sidebar explizit anzeigen
            viewer.toggleSidebar();
            $("#potree_sidebar_container").show();

            console.log("GUI geladen und Sidebar aktiviert");
        });

        // --- DYNAMISCHER LADER (KORRIGIERT FÜR ID + NAME) ---

        const urlParams = new URLSearchParams(window.location.search);

        // WICHTIG: Wir lesen jetzt 'id' statt 'project'
        const projectPathID = urlParams.get('id');       // Liest z.B. "hella/7e20b9/5mm"
        const projectDisplayName = urlParams.get('name'); // Liest z.B. "Hella - 5mm"

        // Wenn kein Name im Link steht, nutzen wir die ID als Fallback
        const finalName = projectDisplayName ? projectDisplayName : projectPathID;

        if (projectPathID) {

            const isCopcProject = projectPathID.toLowerCase().endsWith(".copc.laz");
            const path = isCopcProject
                ? `./pointclouds/${projectPathID}`
                : `./pointclouds/${projectPathID}/metadata.json`;

            // Laden
            Potree.loadPointCloud(path, finalName, e => {
                let scene = viewer.scene;
                let pointcloud = e.pointcloud;

                let material = pointcloud.material;
                material.size = 0.5;
                material.minSize = 1;
                material.pointSizeType = Potree.PointSizeType.ADAPTIVE;
                material.shape = Potree.PointShape.CIRCLE;
                material.activeAttributeName = "rgba";

                scene.addPointCloud(pointcloud);
                viewer.fitToScreen();
            });

            // Setzt den Titel im Browser-Tab
            document.title = finalName;

        } else {
            // Fehlermeldung nur wenn ID komplett fehlt
            console.log("Keine ID im Link gefunden.");
        }

        }); // Ende der checkIfProjectDeleted Promise

    </script>
  </body>
</html>
